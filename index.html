<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组胚刷题 - 源头活水</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c7a7b;
            --primary-light: #38b2ac;
            --primary-dark: #234e52;
            --accent: #ed8936;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --error: #f56565;
            --warning: #ed8936;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .header .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            position: relative;
        }

        /* Navigation */
        .nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Chapter Filter */
        .chapter-filter {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .chapter-filter h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .chapter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chapter-tag {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .chapter-tag:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .chapter-tag.active {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
        }

        .chapter-tag .count {
            opacity: 0.7;
            margin-left: 0.25rem;
        }

        /* Question Card */
        .question-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .question-number {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .question-chapter {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            line-height: 1.7;
            color: var(--text);
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .option:hover {
            border-color: var(--primary-light);
            background: #f0fdfa;
        }

        .option-key {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .option-text {
            font-size: 0.95rem;
            color: var(--text);
            padding-top: 0.15rem;
        }

        .option.correct {
            border-color: var(--success);
            background: #f0fff4;
        }

        .option.correct .option-key {
            background: var(--success);
            color: white;
        }

        .option.wrong {
            border-color: var(--error);
            background: #fff5f5;
        }

        .option.wrong .option-key {
            background: var(--error);
            color: white;
        }

        .option.selected {
            border-color: var(--primary);
            background: #f0fdfa;
        }

        .option.selected .option-key {
            background: var(--primary);
            color: white;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.8;
        }

        .option.disabled:hover {
            border-color: inherit;
        }

        /* Answer Feedback */
        .answer-feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
        }

        .answer-feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .answer-feedback.correct-feedback {
            background: #f0fff4;
            border: 1px solid var(--success);
        }

        .answer-feedback.wrong-feedback {
            background: #fff5f5;
            border: 1px solid var(--error);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .correct-feedback .feedback-title {
            color: var(--success);
        }

        .wrong-feedback .feedback-title {
            color: var(--error);
        }

        .feedback-answer {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Progress */
        .progress-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .progress-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .progress-bar {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Question Dots */
        .question-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
            justify-content: center;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dot:hover {
            transform: scale(1.3);
        }

        .dot.correct {
            background: var(--success);
        }

        .dot.wrong {
            background: var(--error);
        }

        .dot.current {
            box-shadow: 0 0 0 3px rgba(44, 122, 123, 0.3);
            background: var(--primary);
        }

        /* Mode Selection */
        .mode-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .mode-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--border);
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            text-align: center;
        }

        .mode-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .question-card {
                padding: 1rem;
            }
            .mode-selector {
                flex-direction: column;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Shuffle button */
        .shuffle-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .shuffle-btn:hover {
            color: var(--primary);
        }

        /* Bookmark */
        .bookmark-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .bookmark-btn:hover, .bookmark-btn.active {
            color: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>组胚刷题</h1>
        <p class="subtitle">源头活水 · 组织学与胚胎学</p>
    </header>

    <nav class="nav">
        <button class="nav-btn active" data-view="practice">顺序练习</button>
        <button class="nav-btn" data-view="random">随机刷题</button>
        <button class="nav-btn" data-view="chapter">章节练习</button>
        <button class="nav-btn" data-view="wrong">错题本</button>
        <button class="nav-btn" data-view="bookmark">收藏夹</button>
    </nav>

    <main class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>正在加载题库...</p>
        </div>
    </main>

    <footer class="footer">
        <p>组胚刷题 · 源头活水系列 | 共 <span id="total-count">0</span> 道题</p>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        // App State
        let questions = [];
        let currentView = 'practice';
        let currentIndex = 0;
        let currentQuestions = [];
        let userAnswers = {};
        let wrongQuestions = new Set();
        let bookmarkedQuestions = new Set();
        let selectedChapter = null;

        // Load data
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                questions = await response.json();
                document.getElementById('total-count').textContent = questions.length;
                
                // Load saved data
                loadSavedData();
                
                // Initialize view
                currentQuestions = [...questions];
                renderApp();
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>加载题库失败，请刷新页面重试</p>
                    </div>
                `;
            }
        }

        function loadSavedData() {
            try {
                const savedWrong = localStorage.getItem('histology_wrong');
                const savedBookmark = localStorage.getItem('histology_bookmark');
                const savedAnswers = localStorage.getItem('histology_answers');
                
                if (savedWrong) wrongQuestions = new Set(JSON.parse(savedWrong));
                if (savedBookmark) bookmarkedQuestions = new Set(JSON.parse(savedBookmark));
                if (savedAnswers) userAnswers = JSON.parse(savedAnswers);
            } catch (e) {
                console.error('Error loading saved data:', e);
            }
        }

        function saveData() {
            try {
                localStorage.setItem('histology_wrong', JSON.stringify([...wrongQuestions]));
                localStorage.setItem('histology_bookmark', JSON.stringify([...bookmarkedQuestions]));
                localStorage.setItem('histology_answers', JSON.stringify(userAnswers));
            } catch (e) {
                console.error('Error saving data:', e);
            }
        }

        // Shuffle array
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Get chapter counts
        function getChapterCounts() {
            const counts = {};
            questions.forEach(q => {
                counts[q.chapter] = (counts[q.chapter] || 0) + 1;
            });
            return counts;
        }

        // Render functions
        function renderApp() {
            const app = document.getElementById('app');
            
            if (currentView === 'chapter' && !selectedChapter) {
                renderChapterSelect(app);
                return;
            }

            const stats = calculateStats();
            
            let html = `
                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="stat-number">${stats.total}</div>
                        <div class="stat-label">总题数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.answered}</div>
                        <div class="stat-label">已作答</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.correct}</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.accuracy}%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>
            `;

            if (currentQuestions.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p>暂无题目</p>
                    </div>
                `;
                app.innerHTML = html;
                return;
            }

            const q = currentQuestions[currentIndex];
            const userAnswer = userAnswers[q.id];
            const isAnswered = userAnswer !== undefined;

            html += `
                <div class="progress-section">
                    <div class="progress-header">
                        <span class="progress-title">${selectedChapter || (currentView === 'wrong' ? '错题本' : currentView === 'bookmark' ? '收藏夹' : '练习进度')}</span>
                        <span class="progress-text">${currentIndex + 1} / ${currentQuestions.length}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${((currentIndex + 1) / currentQuestions.length) * 100}%"></div>
                    </div>
                    <div class="question-dots">
                        ${currentQuestions.map((qq, i) => {
                            const ua = userAnswers[qq.id];
                            let cls = 'dot';
                            if (i === currentIndex) cls += ' current';
                            else if (ua !== undefined) {
                                cls += ua === qq.answer ? ' correct' : ' wrong';
                            }
                            return `<div class="${cls}" onclick="goToQuestion(${i})"></div>`;
                        }).join('')}
                    </div>
                </div>

                <div class="question-card fade-in">
                    <div class="question-header">
                        <span class="question-number">第 ${q.id} 题</span>
                        <div style="display:flex;gap:0.5rem;align-items:center;">
                            <span class="question-chapter">${q.chapter}</span>
                            <button class="bookmark-btn ${bookmarkedQuestions.has(q.id) ? 'active' : ''}" onclick="toggleBookmark(${q.id})">
                                ${bookmarkedQuestions.has(q.id) ? '★' : '☆'}
                            </button>
                        </div>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map(opt => {
                            let cls = 'option';
                            if (isAnswered) {
                                cls += ' disabled';
                                if (opt.key === q.answer) cls += ' correct';
                                else if (opt.key === userAnswer && opt.key !== q.answer) cls += ' wrong';
                            } else if (userAnswer === opt.key) {
                                cls += ' selected';
                            }
                            return `
                                <div class="${cls}" onclick="selectOption('${opt.key}')">
                                    <span class="option-key">${opt.key}</span>
                                    <span class="option-text">${opt.text}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    ${isAnswered ? `
                        <div class="answer-feedback ${userAnswer === q.answer ? 'correct-feedback' : 'wrong-feedback'} show">
                            <div class="feedback-title">
                                ${userAnswer === q.answer ? '✅ 回答正确' : '❌ 回答错误'}
                            </div>
                            <div class="feedback-answer">
                                正确答案：<strong>${q.answer}</strong>
                                ${q.explanation ? `<br>解析：${q.explanation}` : ''}
                            </div>
                        </div>
                    ` : ''}
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>
                            ← 上一题
                        </button>
                        <button class="btn btn-primary" onclick="nextQuestion()" ${currentIndex === currentQuestions.length - 1 ? 'disabled' : ''}>
                            下一题 →
                        </button>
                    </div>
                </div>
            `;

            app.innerHTML = html;
        }

        function renderChapterSelect(app) {
            const counts = getChapterCounts();
            const chapters = Object.keys(counts).sort();
            
            app.innerHTML = `
                <div class="chapter-filter">
                    <h3>选择章节</h3>
                    <div class="chapter-tags">
                        ${chapters.map(ch => `
                            <button class="chapter-tag" onclick="selectChapter('${ch}')">
                                ${ch}
                                <span class="count">(${counts[ch]})</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function calculateStats() {
            const relevantQuestions = currentView === 'wrong' 
                ? questions.filter(q => wrongQuestions.has(q.id))
                : currentQuestions;
            
            const total = relevantQuestions.length;
            let answered = 0;
            let correct = 0;
            
            relevantQuestions.forEach(q => {
                if (userAnswers[q.id] !== undefined) {
                    answered++;
                    if (userAnswers[q.id] === q.answer) correct++;
                }
            });
            
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            
            return { total, answered, correct, accuracy };
        }

        // Actions
        function selectOption(key) {
            const q = currentQuestions[currentIndex];
            if (userAnswers[q.id] !== undefined) return;
            
            userAnswers[q.id] = key;
            
            if (key !== q.answer) {
                wrongQuestions.add(q.id);
            } else {
                wrongQuestions.delete(q.id);
            }
            
            saveData();
            renderApp();
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderApp();
            }
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderApp();
            }
        }

        function goToQuestion(index) {
            currentIndex = index;
            renderApp();
        }

        function toggleBookmark(id) {
            if (bookmarkedQuestions.has(id)) {
                bookmarkedQuestions.delete(id);
                showToast('已取消收藏');
            } else {
                bookmarkedQuestions.add(id);
                showToast('已收藏');
            }
            saveData();
            renderApp();
        }

        function selectChapter(chapter) {
            selectedChapter = chapter;
            currentQuestions = questions.filter(q => q.chapter === chapter);
            currentIndex = 0;
            renderApp();
        }

        function switchView(view) {
            currentView = view;
            currentIndex = 0;
            selectedChapter = null;
            
            switch(view) {
                case 'practice':
                    currentQuestions = [...questions];
                    break;
                case 'random':
                    currentQuestions = shuffle(questions);
                    showToast('已随机打乱题目顺序');
                    break;
                case 'chapter':
                    currentQuestions = [];
                    break;
                case 'wrong':
                    currentQuestions = questions.filter(q => wrongQuestions.has(q.id));
                    if (currentQuestions.length === 0) {
                        showToast('暂无错题');
                    }
                    break;
                case 'bookmark':
                    currentQuestions = questions.filter(q => bookmarkedQuestions.has(q.id));
                    if (currentQuestions.length === 0) {
                        showToast('暂无收藏');
                    }
                    break;
            }
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            
            renderApp();
        }

        // Event listeners
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (currentQuestions.length === 0) return;
            
            const q = currentQuestions[currentIndex];
            
            if (e.key === 'ArrowLeft') {
                prevQuestion();
            } else if (e.key === 'ArrowRight') {
                nextQuestion();
            } else if (['A', 'B', 'C', 'D', 'E', 'a', 'b', 'c', 'd', 'e'].includes(e.key)) {
                selectOption(e.key.toUpperCase());
            }
        });

        // Initialize
        loadQuestions();
    </script>
</body>
</html>
